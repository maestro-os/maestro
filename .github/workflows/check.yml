name: Check
on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-binutils:
    name: Build binutils
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - &binutils-cache
        name: Restore binutils cache
        id: cache-binutils
        uses: actions/cache@v5
        with:
          path: built-binutils
          key: binutils-2.46.0
      - name: Build binutils
        if: steps.cache-binutils.outputs.cache-hit != 'true'
        run: |
          curl -o binutils.tar.xz https://ftp.gnu.org/gnu/binutils/binutils-2.46.0.tar.xz
          tar xf binutils.tar.xz
          rm binutils.tar.xz
          for target in {i686-elf,x86_64-elf}; do
            binutils-*/configure \
              --prefix=/usr \
              --target="$target" \
              --disable-werror \
              --disable-doc \
              --disable-nls \
              --enable-64-bit-bfd
            make -j$(nproc)
            make DESTDIR="$(pwd)/built-binutils" install
            make distclean
          done

  lint:
    name: Lint & Check Format (${{ matrix.dir }})
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ["macros", "utils", "kernel", "inttest"]
    steps:
      - uses: actions/checkout@v6
      - name: Clippy
        working-directory: ${{ matrix.dir }}
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: Check Format
        working-directory: ${{ matrix.dir }}
        run: cargo fmt --check

  documentation:
    name: Build Documentation (${{ matrix.arch }})
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        arch: ["x86", "x86_64"]
    steps:
      - uses: actions/checkout@v6
      - name: Build references
        working-directory: kernel
        run: cargo doc --target arch/${{ matrix.arch }}/${{ matrix.arch }}.json

  miri:
    name: Miri
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Utils
        working-directory: utils
        env:
          MIRIFLAGS: -Zmiri-disable-stacked-borrows
        run: cargo miri test
        timeout-minutes: 10

  build:
    name: Build (${{ matrix.arch }}, ${{ matrix.profile.dir }})
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [lint, build-binutils]
    strategy:
      fail-fast: false
      matrix:
        arch: ["x86", "x86_64"]
        profile:
          - name: "dev"
            dir: "debug"
          - name: "release"
            dir: "release"
    steps:
      - uses: actions/checkout@v6
      - *binutils-cache
      - name: Add binutils to PATH
        run: echo "$(pwd)/built-binutils/usr/bin" >> $GITHUB_PATH
      - name: Retrieve APT dependencies
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: bash build-essential clang curl grub-pc-bin libssl-dev lld perl pkg-config qemu-system texinfo xorriso
          version: 1.0
      - name: Build
        working-directory: kernel
        run: cargo build --target arch/${{ matrix.arch }}/${{ matrix.arch }}.json --profile ${{ matrix.profile.name }}
      - name: Check Multiboot2
        working-directory: kernel
        run: grub-file --is-x86-multiboot2 target/${{ matrix.arch }}/${{ matrix.profile.dir }}/maestro

  module:
    runs-on: [self-hosted, linux]
    needs: build
    strategy:
      fail-fast: false
      matrix:
        mod: ["e1000", "ps2"]
        arch: ["x86", "x86_64"]
        profile: ["debug", "release"]
    steps:
      - name: Clippy
        working-directory: mod/${{ matrix.mod }}
        env:
          ARCH: ${{ matrix.arch }}
          CMD: clippy
          PROFILE: ${{ matrix.profile }}
        run: ../build -- -D warnings
      - name: Format
        working-directory: mod/${{ matrix.mod }}
        run: cargo fmt --check
      - name: Build
        working-directory: mod/${{ matrix.mod }}
        env:
          ARCH: ${{ matrix.arch }}
          PROFILE: ${{ matrix.profile }}
        run: ../build

  selftest:
    runs-on: [self-hosted, linux]
    needs: module
    strategy:
      fail-fast: false
      matrix:
        arch: ["x86", "x86_64"]
    steps:
      - name: Run utils tests
        working-directory: utils
        run: cargo test
        timeout-minutes: 10
      - name: Run kernel tests
        working-directory: kernel
        env:
          CARGOFLAGS: --target arch/${{ matrix.arch }}/${{ matrix.arch }}.json
        run: ci/test.sh self
        timeout-minutes: 10

  build_inttest:
    name: build_inttest (${{ matrix.arch.kernel }})
    runs-on: [self-hosted, linux]
    needs: module
    strategy:
      fail-fast: false
      matrix:
        arch:
          - kernel: "x86"
            user: "i686-unknown-linux-musl"
          - kernel: "x86_64"
            user: "x86_64-unknown-linux-musl"
            user_compat: "i686-unknown-linux-musl"
    steps:
      - name: Build tests
        working-directory: inttest
        env:
          ARCH: ${{ matrix.arch.kernel }}
          TARGET: ${{ matrix.arch.user }}
        run: |
          ./build.sh
          mv disk disk-${{ matrix.arch.kernel }}
      - name: Build tests (compat)
        if: ${{ matrix.arch.user_compat }}
        working-directory: inttest
        env:
          ARCH: ${{ matrix.arch.kernel }}
          TARGET: ${{ matrix.arch.user_compat }}
        run: |
          ./build.sh
          mv disk disk-${{ matrix.arch.kernel }}-compat

  inttest:
    name: inttest (${{ matrix.arch.kernel }}, ${{ matrix.cores }} CPU(s), ${{ matrix.disktype }})
    runs-on: [self-hosted, linux]
    needs: build_inttest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - kernel: "x86"
            user: "i686-unknown-linux-musl"
          - kernel: "x86_64"
            user: "x86_64-unknown-linux-musl"
            user_compat: "i686-unknown-linux-musl"
        cores: ["1", "2"]
        disktype: ["ide", "nvme"]
    steps:
      - name: Run
        working-directory: kernel
        env:
          CARGOFLAGS: --target arch/${{ matrix.arch.kernel }}/${{ matrix.arch.kernel }}.json
          QEMUFLAGS: "-smp ${{ matrix.cores }}"
          DISKTYPE: ${{ matrix.disktype }}
        run: |
          cp ../inttest/disk-${{ matrix.arch.kernel }} qemu_disk
          ci/test.sh int
        timeout-minutes: 10
      - name: Run (compat)
        if: ${{ matrix.arch.user_compat }}
        working-directory: kernel
        env:
          CARGOFLAGS: --target arch/${{ matrix.arch.kernel }}/${{ matrix.arch.kernel }}.json
          QEMUFLAGS: "-smp ${{ matrix.cores }}"
          DISKTYPE: ${{ matrix.disktype }}
        run: |
          cp ../inttest/disk-${{ matrix.arch.kernel }}-compat qemu_disk
          ci/test.sh int
        timeout-minutes: 10
